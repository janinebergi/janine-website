<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Platzhalter – Header-Bild folgt">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b3a2a"/>
      <stop offset="0.55" stop-color="#123726"/>
      <stop offset="1" stop-color="#0c2118"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d98a"/>
      <stop offset="1" stop-color="#1f9d62"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0" stop-color="#34d98a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#34d98a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>

  <!-- diagonal grid -->
  <g stroke="#2c5a40" stroke-width="1.5" opacity="0.6">
    <path d="M200 0V900M400 0V900M600 0V900M800 0V900M1000 0V900M1200 0V900M1400 0V900"/>
    <path d="M0 150H1600M0 300H1600M0 450H1600M0 600H1600M0 750H1600"/>
  </g>

  <!-- placeholder frame -->
  <rect x="40" y="40" width="1520" height="820" rx="28" fill="none"
        stroke="#34d98a" stroke-width="3" stroke-dasharray="18 16" opacity="0.7"/>

  <!-- landscape / camera glyph -->
  <g transform="translate(800 360)">
    <circle cx="0" cy="-70" r="56" fill="url(#acc)"/>
    <path d="M-220 120 L-90 -30 L10 95 L110 -20 L230 120 Z"
          fill="none" stroke="url(#acc)" stroke-width="14"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <!-- labels -->
  <text x="800" y="600" text-anchor="middle"
        font-family="'Space Grotesk','Segoe UI',sans-serif"
        font-size="40" letter-spacing="14" fill="#aef3cf" font-weight="700">PLATZHALTER</text>
  <text x="800" y="660" text-anchor="middle"
        font-family="'Space Grotesk','Segoe UI',sans-serif"
        font-size="34" fill="#ffffff" font-weight="600">Großes Header-Bild folgt</text>
  <text x="800" y="708" text-anchor="middle"
        font-family="'Inter','Segoe UI',sans-serif"
        font-size="22" fill="#cfe9da">später durch ein aussagekräftiges Bild ersetzen</text>
</svg>
